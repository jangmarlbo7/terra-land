<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Land Map - TERRA</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css">
  <style>
    #map { width: 100%; height: 100vh; }
    .map-controls {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      max-width: 300px;
    }
    .map-search {
      display: flex;
      gap: 8px;
      margin-bottom: 15px;
      flex-direction: column;
    }
    .map-search input {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
      width: 100%;
    }
    .map-search button {
      padding: 10px 12px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }
    .map-search button:hover {
      background: #2980b9;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 15px;
      background: #2c3e50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      text-decoration: none;
      margin-bottom: 10px;
      transition: all 0.3s;
    }
    .back-btn:hover {
      background: #34495e;
    }
    .map-legend {
      position: absolute;
      bottom: 10px;
      right: 10px;
      z-index: 1000;
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      max-width: 300px;
    }
    .legend-item { margin: 8px 0; display: flex; align-items: center; gap: 10px; }
    .legend-color { width: 20px; height: 20px; border-radius: 50%; }
    .popup-content { font-size: 14px; }
    .popup-content strong { display: block; margin: 5px 0; }
    .geolocation-btn {
      padding: 10px 12px;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      width: 100%;
      transition: all 0.3s;
    }
    .geolocation-btn:hover {
      background: #229954;
    }
    .filter-section {
      margin-bottom: 15px;
    }
    .filter-section label {
      font-weight: 600;
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
    }
    .filter-section select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="map-controls">
    <a href="index.html" class="back-btn">← Back to Home</a>
    
    <h3 style="font-size: 14px; margin-bottom: 12px; color: #2c3e50;">Search & Location</h3>
    
    <div class="map-search">
      <input type="text" id="citySearch" placeholder="Search city or location..." />
      <button onclick="searchCity()" style="display: flex; align-items: center; justify-content: center; gap: 6px;"><img src="/icon/search.svg" alt="search" style="width: 16px; height: 16px;"> Search</button>
      <button class="geolocation-btn" onclick="getMyLocation()" style="display: flex; align-items: center; justify-content: center; gap: 6px;"><img src="/icon/loction.svg" alt="location" style="width: 16px; height: 16px;"> My Location</button>
    </div>

    <div class="filter-section">
      <label for="typeFilter">Filter by Type:</label>
      <select id="typeFilter" onchange="filterByType()">
        <option value="">All Types</option>
        <option value="agricultural">🌾 Agricultural</option>
        <option value="residential">🏠 Residential</option>
        <option value="commercial">🏪 Commercial</option>
        <option value="industrial">🏭 Industrial</option>
        <option value="investment">💰 Investment</option>
        <option value="roadside">🛣️ Roadside</option>
        <option value="forest">🌲 Forest</option>
        <option value="empty">📍 Empty</option>
      </select>
    </div>
  </div>

  <div class="map-legend">
    <h4 style="font-size: 13px; margin-bottom: 10px;">Legend</h4>
    <div class="legend-item">
      <div class="legend-color" style="background: #2ecc71;"></div>
      <span style="font-size: 13px;">Available</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background: #f39c12;"></div>
      <span style="font-size: 13px;">Reserved</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background: #e74c3c;"></div>
      <span style="font-size: 13px;">Sold</span>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/lang.js"></script>
  <script src="js/api.js"></script>
  <script>
    let map;
    let markers = {};
    let userMarker = null;
    const statusColors = {
      available: '#2ecc71',
      reserved: '#f39c12',
      sold: '#e74c3c',
      pending: '#95a5a6'
    };

    // Initialize map
    function initMap() {
      map = L.map('map').setView([15.8700, 100.9925], 6);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors',
        maxZoom: 19
      }).addTo(map);

      loadLands();
    }

    // Get user's current location
    function getMyLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            const { latitude, longitude } = position.coords;
            map.setView([latitude, longitude], 12);
            
            // Remove old user marker if exists
            if (userMarker) {
              map.removeLayer(userMarker);
            }
            
            // Add user location marker
            userMarker = L.circleMarker([latitude, longitude], {
              radius: 8,
              fillColor: '#3498db',
              color: '#fff',
              weight: 3,
              opacity: 1,
              fillOpacity: 0.8
            }).addTo(map).bindPopup('📍 Your Location');
            
            userMarker.openPopup();
          },
          (error) => {
            alert('Unable to get your location: ' + error.message);
          }
        );
      } else {
        alert('Geolocation is not supported by your browser');
      }
    }

    // Search city
    async function searchCity() {
      const city = document.getElementById('citySearch').value.trim();
      if (!city) {
        alert('Please enter a city name');
        return;
      }

      try {
        // Use OpenStreetMap Nominatim for geocoding
        const response = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(city)}&format=json`);
        const data = await response.json();
        
        if (data.length === 0) {
          alert('City not found. Try another search.');
          return;
        }

        const { lat, lon, display_name } = data[0];
        map.setView([lat, lon], 10);
        
        // Clear previous search marker
        if (userMarker) map.removeLayer(userMarker);
        
        userMarker = L.marker([lat, lon]).addTo(map).bindPopup(`📍 ${display_name}`);
        userMarker.openPopup();
      } catch (e) {
        alert('Error searching city: ' + e.message);
      }
    }

    // Load all lands
    async function loadLands() {
      try {
        const lands = await apiCall('/api/lands?status=all');
        
        Object.values(markers).forEach(marker => map.removeLayer(marker));
        markers = {};

        lands.forEach(land => {
          if (!land.coordinates || !land.coordinates.coordinates) return;
          
          const [lng, lat] = land.coordinates.coordinates;
          const color = statusColors[land.status] || '#95a5a6';
          
          const icon = L.divIcon({
            html: `<div style="background-color: ${color}; width: 30px; height: 30px; border-radius: 50%; border: 3px solid white; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;">📍</div>`,
            iconSize: [30, 30]
          });

          const marker = L.marker([lat, lng], { icon }).addTo(map);
          
          const title = land.title[Lang.current] || land.title.en;
          const location = land.location[Lang.current] || land.location.en;
          
          const popupHTML = `
            <div class="popup-content">
              <strong>${title}</strong>
              <span>${location}</span>
              <span>💰 ${land.price?.toLocaleString()} THB</span>
              <span>📐 ${land.area}</span>
              <span>Status: ${land.status}</span>
              ${land.status !== 'pending' ? `<a href="index.html?id=${land._id}" style="color: #3498db; text-decoration: none; display: block; margin-top: 5px;">View Details →</a>` : '<span style="color: #95a5a6; display: block; margin-top: 5px;">Pending Approval</span>'}
            </div>
          `;
          
          marker.bindPopup(popupHTML);
          markers[land._id] = marker;
        });
      } catch (e) {
        console.error('Error loading lands:', e);
      }
    }

    // Filter by type
    async function filterByType() {
      try {
        const type = document.getElementById('typeFilter').value;
        const query = type ? `/api/lands?type=${type}&status=all` : '/api/lands?status=all';
        const lands = await apiCall(query);
        
        Object.values(markers).forEach(marker => map.removeLayer(marker));
        markers = {};

        lands.forEach(land => {
          if (!land.coordinates || !land.coordinates.coordinates) return;
          
          const [lng, lat] = land.coordinates.coordinates;
          const color = statusColors[land.status] || '#95a5a6';
          
          const icon = L.divIcon({
            html: `<div style="background-color: ${color}; width: 30px; height: 30px; border-radius: 50%; border: 3px solid white; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;">📍</div>`,
            iconSize: [30, 30]
          });

          const marker = L.marker([lat, lng], { icon }).addTo(map);
          
          const title = land.title[Lang.current] || land.title.en;
          const location = land.location[Lang.current] || land.location.en;
          
          const popupHTML = `
            <div class="popup-content">
              <strong>${title}</strong>
              <span>${location}</span>
              <span>💰 ${land.price?.toLocaleString()} THB</span>
              <span>📐 ${land.area}</span>
              <span>Status: ${land.status}</span>
              ${land.status !== 'pending' ? `<a href="index.html?id=${land._id}" style="color: #3498db;">View Details →</a>` : ''}
            </div>
          `;
          
          marker.bindPopup(popupHTML);
          markers[land._id] = marker;
        });
      } catch (e) {
        console.error('Error filtering lands:', e);
      }
    }

    // Allow Enter key to search
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('citySearch').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchCity();
      });
      initMap();
    });
  </script>
</body>
</html>
